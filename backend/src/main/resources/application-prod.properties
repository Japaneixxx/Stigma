# =============================================================
#  Stigma API — application-prod.properties
#  Perfil de produção (Koyeb)
#  Todas as variáveis sensíveis devem ser definidas como
#  variáveis de ambiente no painel do Koyeb.
# =============================================================

# -------------------------------------------------------------
#  Banco de dados (Neon / Supabase / Aiven / etc.)
# -------------------------------------------------------------
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Hikari — pool conservador para planos gratuitos
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=20000

# Flyway
spring.flyway.url=${DATABASE_URL}
spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false

# -------------------------------------------------------------
#  JPA
# -------------------------------------------------------------
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# -------------------------------------------------------------
#  Swagger — desativado em produção por padrão
# -------------------------------------------------------------
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}
springdoc.api-docs.enabled=${SWAGGER_ENABLED:false}
