# =============================================================
#  Stigma API ? application.properties
#  Perfil ativo: definido pela variável SPRING_PROFILES_ACTIVE
#  Dev: roda automaticamente em dev
#  Prod: Koyeb seta SPRING_PROFILES_ACTIVE=prod
# =============================================================

spring.application.name=Stigma
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

logging.level.org.springframework=DEBUG
# -------------------------------------------------------------
#  JPA / Hibernate
# -------------------------------------------------------------
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -------------------------------------------------------------
#  Flyway
# -------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# -------------------------------------------------------------
#  Upload de arquivos (imagens de referęncia do cliente)
# -------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# -------------------------------------------------------------
#  Virtual Threads ? Java 21 + Spring Boot 4
# -------------------------------------------------------------
spring.threads.virtual.enabled=true

# -------------------------------------------------------------
#  Servidor
# -------------------------------------------------------------
server.port=${PORT:8080}
spring.web.error.include-message=never
spring.web.error.include-stacktrace=never

# -------------------------------------------------------------
#  Actuator ? health check para o Koyeb
# -------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# -------------------------------------------------------------
#  Springdoc / Swagger
#  Habilitado por variável de ambiente ? false em prod por padrăo
# -------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${SWAGGER_ENABLED:false}

# =============================================================
#  Configuraçőes próprias do Stigma
# =============================================================

# JWT
stigma.jwt.secret=${JWT_SECRET}
stigma.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
stigma.jwt.refresh-expiration-ms=${JWT_REFRESH_MS:604800000}

# URLs
stigma.frontend-url=${FRONTEND_URL:http://localhost:3000}

# Mercado Pago
stigma.mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN}
stigma.mercadopago.webhook-secret=${MERCADOPAGO_WEBHOOK_SECRET}

# Google Calendar
stigma.google.client-id=${GOOGLE_CLIENT_ID}
stigma.google.client-secret=${GOOGLE_CLIENT_SECRET}
stigma.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/google/callback}

# WhatsApp (Evolution / Z-API)
stigma.whatsapp.api-url=${WHATSAPP_API_URL}
stigma.whatsapp.api-token=${WHATSAPP_API_TOKEN}
stigma.whatsapp.instance=${WHATSAPP_INSTANCE:stigma}

# Storage ? Cloudflare R2 (compatível com S3)
stigma.storage.endpoint=${STORAGE_ENDPOINT}
stigma.storage.access-key=${STORAGE_ACCESS_KEY}
stigma.storage.secret-key=${STORAGE_SECRET_KEY}
stigma.storage.bucket=${STORAGE_BUCKET:stigma-uploads}
stigma.storage.public-url=${STORAGE_PUBLIC_URL}

# Booking token
stigma.booking.token-expiration-hours=${BOOKING_TOKEN_EXPIRATION_HOURS:48}