# =============================================================
#  Stigma API - application-dev.example.properties
#  Modelo seguro para ambiente de desenvolvimento
# =============================================================

# -------------------------------------------------------------
#  Banco de dados local
# -------------------------------------------------------------
spring.datasource.url=${DEV_DATABASE_URL:jdbc:postgresql://localhost:5432/stigma}
spring.datasource.username=${DEV_DB_USERNAME:postgres}
spring.datasource.password=${DEV_DB_PASSWORD:postgres}

# Flyway
spring.flyway.enabled=true
spring.flyway.url=${DEV_FLYWAY_URL:${DEV_DATABASE_URL:jdbc:postgresql://localhost:5432/stigma}}
spring.flyway.user=${DEV_FLYWAY_USER:${DEV_DB_USERNAME:postgres}}
spring.flyway.password=${DEV_FLYWAY_PASSWORD:${DEV_DB_PASSWORD:postgres}}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.clean-on-validation-error=false
spring.flyway.out-of-order=false
spring.flyway.validate-on-migrate=true

# Hikari
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=60000

# -------------------------------------------------------------
#  SQL visivel no console em dev
# -------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# -------------------------------------------------------------
#  Swagger em dev
# -------------------------------------------------------------
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# -------------------------------------------------------------
#  Valores de integracao para dev
# -------------------------------------------------------------
stigma.jwt.secret=${DEV_JWT_SECRET:dev-secret-key-minimo-32-caracteres-obrigatorio}
stigma.frontend-url=http://localhost:3000
stigma.mercadopago.access-token=${DEV_MERCADOPAGO_ACCESS_TOKEN:placeholder}
stigma.mercadopago.webhook-secret=${DEV_MERCADOPAGO_WEBHOOK_SECRET:placeholder}
stigma.google.client-id=${DEV_GOOGLE_CLIENT_ID:placeholder}
stigma.google.client-secret=${DEV_GOOGLE_CLIENT_SECRET:placeholder}
stigma.whatsapp.api-url=http://localhost:8081
stigma.whatsapp.api-token=${DEV_WHATSAPP_API_TOKEN:placeholder}
stigma.storage.endpoint=${DEV_STORAGE_ENDPOINT:placeholder}
stigma.storage.access-key=${DEV_STORAGE_ACCESS_KEY:placeholder}
stigma.storage.secret-key=${DEV_STORAGE_SECRET_KEY:placeholder}
stigma.storage.public-url=http://localhost:8080

server.port=8083

